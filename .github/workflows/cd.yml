name: CD

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: fintech-analytics-pipeline

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Apply (core)
        working-directory: terraform/core
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="github_repo=chiragpatole/fintech-analytics-pipeline"

      # NOTE: terraform/finops is intentionally NOT applied here — it depends
      # on the one-time manual billing-export console step (see
      # terraform/finops/README.md) and touches billing-account-level
      # resources, which stay a deliberate manual step rather than
      # automatic CD, as a safety boundary.

  dbt-run-prod:
    needs: terraform-apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install -r dbt_project/requirements.txt

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          fintech_analytics:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${{ env.GCP_PROJECT_ID }}
                dataset: analytics_prod
                location: EU
                threads: 4
          EOF

      - name: dbt build against prod
        working-directory: dbt_project
        run: |
          dbt deps || true
          dbt build --target prod

      - name: Publish manifest for next PR's Slim CI
        run: |
          gcloud storage cp \
            dbt_project/target/manifest.json \
            gs://fintech-analytics-pipeline-raw-landing/dbt-state/manifest.json

      - name: Generate dbt docs
        working-directory: dbt_project
        run: dbt docs generate --target prod

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dbt_project/target

  deploy-docs:
    needs: dbt-run-prod
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
